# Render the SEPIA Quarto site and deploy it to GitHub Pages (Pages-from-Actions).
#
# This repo was migrated from workflowr to Quarto (see MIGRATION.md). CI does NOT
# run R: with `execute: freeze: auto` in _quarto.yml, Quarto renders the R-heavy
# pages (introduction, depth, pca, cleaning) from the committed _freeze/ results,
# which are produced by a one-time local `quarto render` on a machine with R + the
# data files. Prose pages (index, about, license) render without any of that.
#
# It also copies the project plan into /plan/ so the roadmap resolves at a direct
# link (https://lasisilab.github.io/sepia/plan/) but stays out of the site navbar.
# The internal plan.md / changelog.md sources are deliberately NOT published.
#
# Action versions pinned to current Node-24 majors (checked 2026-07).
name: Publish site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: quarto-dev/quarto-actions/setup@v2

      - name: Render Quarto site
        run: quarto render

      - name: Add the project plan at /plan/ (direct link only, not in navbar)
        run: |
          set -euo pipefail
          mkdir -p _site/plan
          # 1) the rendered plan HTML (roadmap, changelog, provenance, …)
          cp plan/*.html _site/plan/
          # 2) consequence figures referenced by the plan HTML (before/after record).
          if [ -d plan/figures ]; then
            mkdir -p _site/plan/figures
            cp plan/figures/*.png _site/plan/figures/ 2>/dev/null || true
          fi
          # 3) generated doc HTML that lives in sub-folders (papers/, verify/).
          for sub in papers verify; do
            if ls plan/$sub/*.html >/dev/null 2>&1; then
              mkdir -p _site/plan/$sub
              cp plan/$sub/*.html _site/plan/$sub/
            fi
          done
          # Belt-and-braces: Pages-from-Actions doesn't run Jekyll, but Quarto ships
          # underscore dirs (_files/), so keep .nojekyll to be safe.
          touch _site/.nojekyll

      - uses: actions/configure-pages@v6
        with:
          # Self-provision Pages if not already enabled. NOTE: an org repo's
          # built-in token may lack permission to CREATE the site on the first
          # run; if so, enable once (Settings → Pages → Source = GitHub Actions,
          # or `gh api -X POST repos/<owner>/<repo>/pages -f build_type=workflow`).
          enablement: true

      - uses: actions/upload-pages-artifact@v5
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
