# Publish the SEPIA site to GitHub Pages via the native Pages-from-Actions path.
#
# NOTE ON BUILD SYSTEM: this repo is a **workflowr** (R Markdown) project, not
# Quarto. The workflowr site is built locally with wflow_publish() and the output
# is committed to docs/; CI does NOT re-run R (that needs R + the genomics stack +
# cluster data). This job therefore just *assembles and deploys the already-built
# static output* — the same deploy pattern as the Quarto publish-site.yml in
# tinalasisi/pigmentation-gene-network, adapted to workflowr.
#
# It also copies plan/*.html into /plan/ so the roadmap resolves at a direct link
# (https://lasisilab.github.io/sepia/plan/) but is NOT in the site navbar.
# The internal plan.md / changelog.md sources are deliberately NOT published.
#
# Action versions pinned to current Node-24 majors (checked 2026-07; GitHub is
# deprecating Node 20 on runners). Bump these together if a Node-20 warning returns.
name: Publish site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Latest push to main always wins; a new run cancels an in-flight/queued one.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Assemble site (workflowr docs/ + plan/)
        run: |
          set -euo pipefail
          rm -rf _site && mkdir -p _site
          # 1) the workflowr-built site (index, introduction, depth, pca, …)
          cp -R docs/. _site/
          # 2) the plan — reachable at /plan/ by direct link, absent from the navbar.
          #    Publish only the rendered HTML; keep plan.md / changelog.md repo-only.
          mkdir -p _site/plan
          cp plan/*.html _site/plan/
          # 3) consequence figures referenced by the plan HTML (before/after record).
          if [ -d plan/figures ]; then
            mkdir -p _site/plan/figures
            cp plan/figures/*.png _site/plan/figures/ 2>/dev/null || true
          fi
          # 3b) generated doc HTML that lives in sub-folders (papers/, verify/).
          for sub in papers verify; do
            if ls plan/$sub/*.html >/dev/null 2>&1; then
              mkdir -p _site/plan/$sub
              cp plan/$sub/*.html _site/plan/$sub/
            fi
          done
          # GitHub Pages must not run Jekyll (workflowr ships _files/ + site_libs/).
          touch _site/.nojekyll

      - uses: actions/configure-pages@v6
        with:
          # Self-provision Pages (source = GitHub Actions) if not already enabled.
          # NOTE: an org repo's built-in Actions token may lack permission to CREATE
          # the Pages site on the very first run; if so, enable it once by hand
          # (Settings → Pages → Source = GitHub Actions, or `gh api -X POST
          # repos/<owner>/<repo>/pages -f build_type=workflow`), then re-run.
          enablement: true

      - uses: actions/upload-pages-artifact@v5
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
